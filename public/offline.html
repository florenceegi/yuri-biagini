<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline — Creator Staging</title>
    <style>
      html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; height: 100%; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 2rem; text-align: center; }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; letter-spacing: 0.01em; }
      p { font-size: 0.9375rem; color: #ccc; max-width: 36ch; margin: 0 auto; line-height: 1.5; }
      button { margin-top: 1.5rem; background: #ffd200; color: #000; border: none; padding: 0.625rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.875rem; }
      button:hover { background: #ffe566; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>You are offline</h1>
        <p>Please check your connection and try again. Previously visited pages may still be available from cache.</p>
        <button type="button" onclick="location.reload()">Retry</button>
      </div>
    </main>
  </body>
</html>
