name: Deploy CREATOR-STAGING
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-creator-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (change detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          BASE="/home/forge/creator-staging.florenceegi.com"
          SCRIPT="cd $BASE && git checkout -- . && git pull origin main && npm install --no-audit --no-fund && npm run build && pm2 restart creator-staging"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters '{"commands":["sudo -u forge bash -lc \"'"$SCRIPT"'\""]}' \
            --query "Command.CommandId" --output text)

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy OK"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "FAILED: $STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timeout waiting for SSM"
          exit 1
